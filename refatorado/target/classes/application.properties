# =============================================================================
# ApiPagamento — Configuração BASE
# Valores específicos de ambiente ficam em application-dev/prod.properties
# =============================================================================
spring.application.name=apipagamento

# Porta: Render define PORT; local usa 3000
server.port=${PORT:3000}

# Perfil ativo (sobrescrito por SPRING_PROFILES_ACTIVE no Render)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Mercado Pago ──────────────────────────────────────────────────────────────
# OBRIGATÓRIO — jamais commitar o valor real
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.app-base-url=${MERCADOPAGO_APP_BASE_URL:}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}

# ── Frontend (backUrls do Mercado Pago) ───────────────────────────────────────
app.frontend.url=${APP_FRONTEND_URL:https://landing-pag-api-pagamentos.vercel.app}

# ── Produto ───────────────────────────────────────────────────────────────────
app.product.title=${APP_PRODUCT_TITLE:Curso Completo de Backend}
app.product.description=${APP_PRODUCT_DESCRIPTION:Aprenda a criar APIs profissionais com banco de dados e pagamentos integrados}
app.product.price=${APP_PRODUCT_PRICE:99.90}

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ORIGINS:}

# ── Actuator (health check real para o Render) ────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ── OpenAPI / Swagger ─────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
