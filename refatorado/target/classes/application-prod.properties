# =============================================================================
# Perfil: prod (Render)
# Todas as variáveis sensíveis devem ser configuradas no Dashboard do Render.
# =============================================================================

# ── Banco de dados ────────────────────────────────────────────────────────────
# DATABASE_URL é injetado automaticamente pelo Render via render.yaml
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# NUNCA use create/update em produção — Flyway controla o schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── CORS (produção: apenas frontend na Vercel) ────────────────────────────────
# APP_CORS_ORIGINS deve ser definido no Render Dashboard
app.cors.allowed-origins=${APP_CORS_ORIGINS:https://landing-pag-api-pagamentos.vercel.app}

# ── Logs ──────────────────────────────────────────────────────────────────────
logging.level.com.aylan=INFO
logging.level.root=WARN
