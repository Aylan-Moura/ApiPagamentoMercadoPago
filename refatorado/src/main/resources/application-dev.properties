# =============================================================================
# Perfil: dev (uso local)
# Copie .env.example para .env e preencha as variáveis antes de rodar.
# NUNCA adicione valores reais aqui — este arquivo é versionado.
# =============================================================================

# ── Banco de dados ────────────────────────────────────────────────────────────
# Defina DATABASE_URL, DATABASE_USERNAME e DATABASE_PASSWORD no seu .env local
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/apipagamento_dev}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate: Flyway gerencia o schema; Hibernate apenas valida a consistência
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── CORS (dev: localhost + Vercel para testes) ────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:63342,http://127.0.0.1:63342,https://landing-pag-api-pagamentos.vercel.app}

# ── Logs ──────────────────────────────────────────────────────────────────────
logging.level.com.aylan=DEBUG
logging.level.org.springframework.web=INFO
